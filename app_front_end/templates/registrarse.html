{% extends 'base.html' %}

{% block titulo %}{{ titulo }}{% endblock %}

{% block body %}
<h1>¡Registrate!</h1>
    <form action="{{ url_for('registrarse_bp.registrarse') }}" method="POST">
        <!-- Nombre -->
        <label for="usuario">Nombre de Usuario</label><br>
        <input type="text" id="usuario" name="nombre_usuario" class="form-control" placeholder="👤 Nombre de Usuario" required><br>
        <!-- Mail -->
        <label for="mail">E-Mail</label><br>
        <input type="email" id="mail" name="email_registro" class="form-control" placeholder="📧 E-Mail" required><br>
        <!-- Confirmación del Mail -->
        <label for="confirmar_mail">Confirmar E-Mail</label><br>
        <input type="email" id="confirmar_mail" name="email_confirmacion" class="form-control" placeholder="📧 Confirmar E-Mail" required><br>
        <!-- Contraseña -->
        <label for="password_user">Contraseña</label><br>
        <input type="password" id="password_user" name="contrasena_registro" class="form-control" placeholder="🔒 Contraseña" required><br>
        <!-- Teléfono -->
        <label for="nro_telefono">Teléfono</label><br>
        <input type="number" id="nro_telefono" name="telefono_usuario" class="form-control" placeholder="📱 Teléfono" required><br>
        <!-- Dirección -->
        <label for="direccion_user">Dirección</label><br>
        <input type="text" id="direccion_user" name="direccion_usuario" class="form-control" placeholder="🏡 Dirección" required><br>
        <!-- DNI -->
        <label for="dni_user">DNI</label><br>
        <input type="number" id="dni_user" name="dni_usuario" class="form-control" placeholder="🪪 DNI" required><br>
        <!-- Botón de Envío -->
        <button type="submit" id="envio" class="btn-formulario">Registrarse</button>
    </form>
<p>¿Ya tenés una cuenta? Iniciá sesión <a href="{{ url_for('iniciar_sesion_bp.iniciar_sesion') }}">acá!</a></p>

{% endblock %}
